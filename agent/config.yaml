name: HA Agent
version: 0.1.0
slug: ha_agent
description: Gemini-backed action-taking agent for Home Assistant
arch:
  - amd64
  - aarch64
startup: services
init: false
ingress: true
ingress_port: 8000
panel_icon: mdi:robot-happy
panel_title: HA Agent
homeassistant_api: true
hassio_api: true
auth_api: true
host_network: false
map:
  - data:rw
ports:
  "8000/tcp": null
options:
  google_api_key: ""
  model: gemini-flash-latest
  language: nl
  log_level: info
  rate_limit_per_min: 20
  session_idle_minutes: 30
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  adults:
    - edwin
    - ilona
schema:
  google_api_key: password
  model: str
  language: str
  log_level: list(debug|info|warning|error)
  rate_limit_per_min: int(1,200)
  session_idle_minutes: int(5,240)
  embedding_model: str
  adults:
    - str
