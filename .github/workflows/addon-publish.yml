name: Home Assistant Add-on Publish

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/addon-publish.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty to use agent/config.yaml)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-addon:
    name: Build Add-on Image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch:
          - amd64
          - aarch64
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and image prefix
        id: meta
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' agent/config.yaml | sed 's/version: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/' | tr -d ' ')
          fi
          IMAGE_PREFIX="${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-addon"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_prefix=$IMAGE_PREFIX" >> $GITHUB_OUTPUT
          echo "Add-on version: $VERSION"
          echo "Image prefix:   $IMAGE_PREFIX"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-${{ matrix.arch }}:latest
            ${{ steps.meta.outputs.image_prefix }}-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
          labels: |
            io.hass.name=HA Agent
            io.hass.description=Gemini-backed action-taking agent for Home Assistant
            io.hass.version=${{ steps.meta.outputs.version }}
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
